<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>MR. CHAO TATTOO</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#050505;color:#e0e0e0;font-family:system-ui,sans-serif;padding:20px;}
.container{max-width:1200px;margin:0 auto;}
.logo{text-align:center;padding:20px;border-bottom:1px solid #1a1a1a;margin-bottom:30px;cursor:pointer;}
.logo h1{font-size:48px;letter-spacing:4px;background:linear-gradient(135deg,#fff,#888);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo p{font-size:12px;color:#666;margin-top:5px;}
.master-bio{background:#0a0a0a;border:1px solid #1a1a1a;padding:20px;margin-bottom:30px;border-radius:8px;}
.master-bio h3{font-size:20px;margin-bottom:10px;}
.master-bio p{color:#888;line-height:1.6;}
.nav{display:flex;gap:10px;margin-bottom:30px;flex-wrap:wrap;}
.nav-btn{padding:12px 24px;background:#111;border:1px solid #222;color:#888;cursor:pointer;font-weight:bold;}
.nav-btn.active{background:#2a2a2a;color:#fff;}
.panel{display:none;}
.panel.active{display:block;}
.portfolio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}
.portfolio-item{background:#0a0a0a;border:1px solid #1a1a1a;overflow:hidden;}
.portfolio-img{width:100%;height:260px;object-fit:cover;background:#111;}
.portfolio-info{padding:12px;}
.portfolio-title{font-weight:600;margin-bottom:4px;}
.portfolio-desc{font-size:12px;color:#666;}
.btn{width:100%;padding:14px;background:#2a2a2a;border:none;color:#fff;font-weight:bold;cursor:pointer;margin-top:20px;}
.btn:hover{background:#3a3a3a;}
input,select,textarea{width:100%;padding:12px;background:#111;border:1px solid #222;color:#fff;margin-bottom:16px;}
.admin-section{background:#0a0a0a;border:1px solid #1a1a1a;padding:20px;margin-bottom:20px;}
.notification{position:fixed;bottom:20px;right:20px;background:#222;padding:10px 20px;z-index:1000;}
</style>
</head>
<body>
<div class="container">
  <div class="logo" id="logo">
    <h1>MR. CHAO</h1>
    <p>TATTOO STUDIO</p>
  </div>

  <div class="master-bio">
    <h3>ЛЁНЯ / MR. CHAO</h3>
    <p>Привет 👋 Меня зовут Лёня, я занимаюсь татуировкой 5 лет. 💉<br>Работаю в стиле графика. Хабаровск-Владивосток.<br>Разработка эскиза бесплатная. Работаю по предзаписи, с депозитом.</p>
  </div>

  <div class="nav">
    <button class="nav-btn active" data-panel="booking">ЗАПИСЬ</button>
    <button class="nav-btn" data-panel="portfolio">ПОРТФОЛИО</button>
    <button class="nav-btn" id="adminNavBtn" style="display:none" data-panel="admin">АДМИН</button>
  </div>

  <div class="panel active" id="panelBooking">
    <div style="background:#0a0a0a;border:1px solid #1a1a1a;padding:30px;max-width:600px;margin:0 auto;">
      <h2 style="margin-bottom:20px">ЗАПИСЬ НА ТАТУ</h2>
      <input type="text" id="name" placeholder="Ваше имя">
      <input type="tel" id="phone" placeholder="Телефон">
      <select id="service">
        <option value="">Выберите услугу</option>
        <option>Новая татуировка</option>
        <option>Перекрытие</option>
        <option>Доработка</option>
        <option>Консультация</option>
      </select>
      <input type="date" id="date">
      <input type="text" id="time" placeholder="Желаемое время (например: 14:00)">
      <textarea id="idea" rows="3" placeholder="Опишите идею"></textarea>
      <button class="btn" onclick="sendBooking()">ОТПРАВИТЬ ЗАЯВКУ</button>
    </div>
  </div>

  <div class="panel" id="panelPortfolio">
    <div class="portfolio-grid" id="portfolioGrid"></div>
  </div>

  <div class="panel" id="panelAdmin">
    <div class="admin-section">
      <h3>ДОБАВИТЬ РАБОТУ</h3>
      <input type="text" id="adminTitle" placeholder="Название">
      <input type="file" id="adminImage" accept="image/*">
      <textarea id="adminDesc" placeholder="Описание"></textarea>
      <button class="btn" onclick="addPortfolio()">ДОБАВИТЬ</button>
    </div>
    <div class="admin-section">
      <h3>УПРАВЛЕНИЕ</h3>
      <div id="adminList"></div>
    </div>
  </div>
</div>

<script>
const BOT_TOKEN = '8770410681:AAGPYDmTWSE5m95LdlvvLk4tCoECHsfAedU';
const CHAT_ID = '1085941747';

let portfolio = [];
let clickCount = 0;
let clickTimer = null;

// Загрузка портфолио
function loadPortfolio() {
  const saved = localStorage.getItem('portfolio');
  if(saved) portfolio = JSON.parse(saved);
  else portfolio = [];
  renderPortfolio();
  renderAdminList();
}

function savePortfolio() {
  localStorage.setItem('portfolio', JSON.stringify(portfolio));
  renderPortfolio();
  renderAdminList();
}

function renderPortfolio() {
  const grid = document.getElementById('portfolioGrid');
  if(portfolio.length === 0) {
    grid.innerHTML = '<div style="text-align:center;padding:40px;color:#666">Портфолио пополняется...</div>';
    return;
  }
  grid.innerHTML = portfolio.map(item => `
    <div class="portfolio-item">
      <img class="portfolio-img" src="${item.image}" onerror="this.src='https://placehold.co/400x300/222?text=NO+IMAGE'">
      <div class="portfolio-info">
        <div class="portfolio-title">${escapeHtml(item.title)}</div>
        <div class="portfolio-desc">${escapeHtml(item.desc)}</div>
      </div>
    </div>
  `).join('');
}

function renderAdminList() {
  const list = document.getElementById('adminList');
  if(portfolio.length === 0) {
    list.innerHTML = '<div style="padding:20px;color:#666">Нет работ</div>';
    return;
  }
  list.innerHTML = portfolio.map((item, i) => `
    <div style="display:flex;justify-content:space-between;align-items:center;background:#111;padding:10px;margin-bottom:8px;border:1px solid #222">
      <div><strong>${escapeHtml(item.title)}</strong><br><small>${escapeHtml(item.desc)}</small></div>
      <button onclick="deleteItem(${i})" style="background:transparent;border:1px solid #333;color:#888;padding:6px 12px;cursor:pointer">УДАЛИТЬ</button>
    </div>
  `).join('');
}

function addPortfolio() {
  const title = document.getElementById('adminTitle').value.trim();
  const file = document.getElementById('adminImage').files[0];
  const desc = document.getElementById('adminDesc').value.trim();
  if(!title || !file) { alert('Заполните название и выберите фото'); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    portfolio.unshift({ id: Date.now(), title, image: e.target.result, desc });
    savePortfolio();
    document.getElementById('adminTitle').value = '';
    document.getElementById('adminImage').value = '';
    document.getElementById('adminDesc').value = '';
    alert('Работа добавлена!');
  };
  reader.readAsDataURL(file);
}

function deleteItem(index) {
  portfolio.splice(index, 1);
  savePortfolio();
}

function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;}); }

// Админка по 15 нажатиям
document.getElementById('logo').addEventListener('click', () => {
  clickCount++;
  if(clickTimer) clearTimeout(clickTimer);
  clickTimer = setTimeout(() => { clickCount = 0; }, 800);
  if(clickCount >= 15) {
    clickCount = 0;
    const pwd = prompt('Пароль администратора:');
    if(pwd === 'chao123') {
      localStorage.setItem('isAdmin', 'true');
      document.getElementById('adminNavBtn').style.display = 'block';
      alert('Админ-панель активирована!');
    } else if(pwd !== null) alert('Неверный пароль');
    if(clickTimer) clearTimeout(clickTimer);
  }
});

if(localStorage.getItem('isAdmin') === 'true') {
  document.getElementById('adminNavBtn').style.display = 'block';
}

// Отправка заявки
async function sendBooking() {
  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const service = document.getElementById('service').value;
  const date = document.getElementById('date').value;
  const time = document.getElementById('time').value;
  const idea = document.getElementById('idea').value;
  
  if(!name || !phone || !service) { alert('Заполните имя, телефон и услугу'); return; }
  
  let tgUser = 'Гость';
  try {
    const user = window.Telegram?.WebApp?.initDataUnsafe?.user;
    if(user) tgUser = user.username ? `@${user.username}` : `${user.first_name || ''} ${user.last_name || ''}`.trim() || 'Гость';
  } catch(e) {}
  
  const msg = `🖤 НОВАЯ ЗАЯВКА 🖤\n\n👤 Клиент: ${name}\n📞 Телефон: ${phone}\n✈️ Telegram: ${tgUser}\n📋 Услуга: ${service}\n📅 Дата: ${date || 'не указана'}\n⏰ Время: ${time || 'не указано'}\n💬 Идея: ${idea || 'не указана'}`;
  
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'ОТПРАВЛЯЮ...';
  
  try {
    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: CHAT_ID, text: msg })
    });
    alert('✅ Заявка отправлена! Мастер свяжется с вами.');
    document.getElementById('name').value = '';
    document.getElementById('phone').value = '';
    document.getElementById('service').value = '';
    document.getElementById('date').value = '';
    document.getElementById('time').value = '';
    document.getElementById('idea').value = '';
  } catch(e) { alert('❌ Ошибка отправки'); }
  btn.disabled = false;
  btn.textContent = 'ОТПРАВИТЬ ЗАЯВКУ';
}

// Навигация
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const panel = btn.dataset.panel;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    if(panel === 'booking') document.getElementById('panelBooking').classList.add('active');
    if(panel === 'portfolio') document.getElementById('panelPortfolio').classList.add('active');
    if(panel === 'admin') document.getElementById('panelAdmin').classList.add('active');
  });
});

// Telegram WebApp
if(window.Telegram?.WebApp) { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); }

loadPortfolio();
</script>
</body>
</html>
